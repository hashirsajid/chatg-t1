<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced AI Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chatbot-container">
    <header id="header">
      <h1>
        <img
          src="https://img.icons8.com/color/48/000000/bot.png"
          alt="Bot"
          class="bot-icon"
        />
        Hashir - AI Chatbot
      </h1>
    </header>

    <main id="chatbot">
      <section id="conversation">
        <div class="chatbot-message">
          <p class="chatbot-text">Hi! My name is Muhammad Hashir. How can I help you today?</p>
        </div>
      </section>

      <div id="typing-indicator" class="hidden">AI is typing...</div>

      <form id="input-form" autocomplete="off" aria-label="Chat input form">
        <input
          id="input-field"
          type="text"
          placeholder="Type your message here..."
          autocomplete="off"
          aria-label="Chat input"
          required
        />
        <button id="submit-button" type="submit" aria-label="Send message">
          <img
            class="send-icon"
            src="https://icons.veryicon.com/png/o/miscellaneous/admin-dashboard-flat-multicolor/send-message.png"
            alt="Send"
            width="24"
            height="24"
          />
        </button>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
